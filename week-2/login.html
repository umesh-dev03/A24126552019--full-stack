  <header>
    <div class="logo-section">
      <img src="assets/anits.jpeg" alt="College Logo" width="80" height="80" />

        <h1>ANIL NEERUKONDA INSTITUTE OF TECHNOLOGY AND SCIENCES</h1>

  <nav>

  <main style="text-align:center; margin-top:60px;">
    <article class="card" style="width:900px; margin:0 auto; padding:40px;">
      <h2>Student Login</h2>
      <form action="success.html" method="get">
        <div style="text-align:left; margin:20px 70px;">
          <label>Username</label><br>
          <input type="text" name="student_name" required style="width:100%;" />
          <br><br>
          <label>Password</label><br>
          <input type="password" name="password" required style="width:100%;" />
          <br><br>
          <input type="submit" value="Login" style="width:100%; padding:12px; background:blue; color:white; border:none; border-radius:6px; font-size:18px;" />
        </div>
      </form>
    </article>
  </main>
